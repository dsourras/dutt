<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>Thank you — dutt</title>
  <meta name="theme-color" content="#05070b" />
  <style>
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(86, 131, 255, 0.14), transparent 32%),
        linear-gradient(180deg, #05070b 0%, #070c13 40%, #04060a 100%);
      color: white;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
    }

    .card {
      width: min(560px, 100%);
      padding: 32px 24px;
      border-radius: 28px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 20px 60px rgba(0,0,0,0.28);
      backdrop-filter: blur(14px);
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 8vw, 3rem);
      letter-spacing: -0.04em;
      line-height: 1;
    }

    p {
      margin: 0;
      color: #cdd7e6;
      line-height: 1.75;
      font-size: 1rem;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 22px;
      min-height: 50px;
      padding: 14px 22px;
      border-radius: 999px;
      color: #081018;
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(230,236,244,0.92));
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Application received.</h1>
    <p>
      Thank you for your interest in joining dutt. We will review your submission
      and contact you soon.
    </p>
    <a href="/">Back to homepage</a>
  </div>
</body>
</html>
