<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>Thank you — dutt</title>
  <meta name="theme-color" content="#05070b" />
  <style>
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(86, 131, 255, 0.14), transparent 32%),
        linear-gradient(180deg, #05070b 0%, #070c13 40%, #04060a 100%);
      color: white;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
    }

    .card {
      width: min(560px, 100%);
      padding: 32px 24px;
      border-radius: 28px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 20px 60px rgba(0,0,0,0.28);
      backdrop-filter: blur(14px);
    }

    .lang-switcher {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      margin-bottom: 18px;
    }

    .lang-btn {
      border: none;
      background: transparent;
      color: #b8c5d7;
      padding: 8px 12px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
    }

    .lang-btn.active {
      background: rgba(255,255,255,0.12);
      color: white;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 8vw, 3rem);
      letter-spacing: -0.04em;
      line-height: 1;
    }

    p {
      margin: 0;
      color: #cdd7e6;
      line-height: 1.75;
      font-size: 1rem;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 22px;
      min-height: 50px;
      padding: 14px 22px;
      border-radius: 999px;
      color: #081018;
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(230,236,244,0.92));
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="lang-switcher">
      <button class="lang-btn active" type="button" data-lang="en">EN</button>
      <button class="lang-btn" type="button" data-lang="el">GR</button>
    </div>

    <h1 data-i18n="title">Application received.</h1>
    <p data-i18n="text">
      Thank you for your interest in joining dutt. We will review your submission
      and contact you soon.
    </p>
    <a href="/" data-i18n="btn">Back to homepage</a>
  </div>

  <script>
    const translations = {
      en: {
        title: "Application received.",
        text: "Thank you for your interest in joining dutt. We will review your submission and contact you soon.",
        btn: "Back to homepage"
      },
      el: {
        title: "Η αίτηση ελήφθη.",
        text: "Ευχαριστούμε για το ενδιαφέρον σου να γίνεις μέλος του dutt. Θα εξετάσουμε την αίτησή σου και θα επικοινωνήσουμε σύντομα μαζί σου.",
        btn: "Επιστροφή στην αρχική"
      }
    };

    function setLanguage(lang) {
      const dict = translations[lang] || translations.en;
      document.documentElement.lang = lang;
      localStorage.setItem("dutt_lang", lang);

      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const key = el.getAttribute("data-i18n");
        if (dict[key] !== undefined) el.textContent = dict[key];
      });

      document.querySelectorAll(".lang-btn").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.lang === lang);
      });
    }

    document.querySelectorAll(".lang-btn").forEach((btn) => {
      btn.addEventListener("click", () => setLanguage(btn.dataset.lang));
    });

    setLanguage(localStorage.getItem("dutt_lang") || "en");
  </script>
</body>
</html>
